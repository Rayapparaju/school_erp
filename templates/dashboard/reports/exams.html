{% extends 'dashboard/base.html' %}{% load static %}
{% block title %}Exam Report - {{ SCHOOL_NAME }}{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4"><h4 class="fw-bold mb-0"><i class="fas fa-poll me-2 text-primary"></i>Exam Results Report</h4></div>
<div class="row g-4 mb-4">
    <div class="col-md-6"><div class="card border-0 shadow-sm rounded-4 p-4 text-center"><h2 class="fw-bold text-primary">{{ results.count }}</h2><small class="text-muted">Total Results</small></div></div>
    <div class="col-md-6"><div class="card border-0 shadow-sm rounded-4 p-4 text-center"><h2 class="fw-bold text-success">{{ avg_marks|floatformat:1 }}%</h2><small class="text-muted">Average Marks</small></div></div>
</div>
<div class="card border-0 shadow-sm rounded-4"><div class="card-body p-3"><canvas id="examChart" height="200"></canvas></div></div>
{% endblock %}
{% block extra_js %}
<script>fetch('/dashboard/chart-data/').then(r=>r.json()).then(d=>{new Chart(document.getElementById('examChart'),{type:'line',data:{labels:['Term 1','Term 2','Term 3','Term 4'],datasets:[{label:'Avg Performance',data:[{{ avg_marks|floatformat:0 }},{{ avg_marks|floatformat:0 }},{{ avg_marks|floatformat:0 }},{{ avg_marks|floatformat:0 }}],borderColor:'#667eea',fill:true,backgroundColor:'rgba(102,126,234,0.1)'}]},options:{responsive:true,plugins:{legend:{display:false}}}})});</script>
{% endblock %}
