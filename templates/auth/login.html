{% extends 'base.html' %}
{% load static %}
{% block title %}Login - {{ SCHOOL_NAME }}{% endblock %}
{% block content %}
<div class="min-vh-100 d-flex align-items-center py-5" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-4 col-md-6">
                <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                    <div class="card-header bg-transparent text-center pt-4 border-0">
                        <div class="mb-3">
                            <div class="rounded-circle bg-primary-gradient d-inline-flex align-items-center justify-content-center" style="width: 70px; height: 70px;">
                                <i class="fas fa-user-graduate fa-2x text-white"></i>
                            </div>
                        </div>
                        <h4 class="fw-bold">Welcome Back</h4>
                        <p class="text-muted small">Sign in to your account</p>
                    </div>
                    <div class="card-body px-4 pb-4">
                        <form method="post">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label class="form-label small fw-medium">Username</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                                    {{ form.username }}
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label small fw-medium">Password</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                    {{ form.password }}
                                </div>
                            </div>
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <div class="form-check">
                                    <input type="checkbox" class="form-check-input" id="remember">
                                    <label class="form-check-label small" for="remember">Remember me</label>
                                </div>
                                <a href="{% url 'password_reset' %}" class="small text-primary">Forgot Password?</a>
                            </div>
                            <button type="submit" class="btn btn-primary-gradient w-100 py-2 rounded-pill fw-medium">
                                <i class="fas fa-sign-in-alt me-2"></i>Sign In
                            </button>
                        </form>
                        <div class="text-center mt-3">
                            <p class="small text-muted">Don't have an account? <a href="{% url 'register' %}" class="fw-medium text-primary">Register</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
