{% extends 'base.html' %}{% load static %}{% block title %}Email Sent - {{ SCHOOL_NAME }}{% endblock %}
{% block content %}

<div class="container"><div class="row justify-content-center"><div class="col-lg-5">
<div class="card border-0 shadow-lg rounded-4"><div class="card-body p-5 text-center">
<div class="rounded-circle bg-success d-inline-flex align-items-center justify-content-center mb-3" style="width:80px;height:80px;"><i class="fas fa-check-circle fa-3x text-white"></i></div>

</div></div></div></div></div></div>
