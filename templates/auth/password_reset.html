{% extends 'base.html' %}{% load static %}{% block title %}Reset Password - {{ SCHOOL_NAME }}{% endblock %}
{% block content %}
<div class="min-vh-100 d-flex align-items-center py-5" style="background:linear-gradient(135deg,#215e61,#ff9e20);">
<div class="container"><div class="row justify-content-center"><div class="col-lg-4 col-md-6">
<div class="card border-0 shadow-lg rounded-4"><div class="card-body p-4 text-center">
<div class="rounded-circle bg-primary-gradient d-inline-flex align-items-center justify-content-center mb-3" style="width:70px;height:70px;"><i class="fas fa-key fa-2x text-white"></i></div>
<h4 class="fw-bold">Reset Password</h4><p class="text-muted small">Enter your email to receive reset link</p>
<form method="post">{% csrf_token %}
<div class="mb-3"><label class="form-label small">Email</label><input type="email" name="email" class="form-control" placeholder="your@email.com"></div>
<button type="submit" class="btn btn-primary-gradient w-100 rounded-pill py-2"><i class="fas fa-paper-plane me-2"></i>Send Reset Link</button>
</form>
<div class="mt-3"><a href="{% url 'login' %}" class="small text-primary">Back to Login</a></div>
</div></div></div></div></div></div>
{% endblock %}
