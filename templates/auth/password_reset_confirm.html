{% extends 'base.html' %}{% load static %}{% block title %}Set New Password - {{ SCHOOL_NAME }}{% endblock %}
{% block content %}
<div class="min-vh-100 d-flex align-items-center py-5" style="background:linear-gradient(135deg,#215e61,#ff9e20);">
<div class="container"><div class="row justify-content-center"><div class="col-lg-4">
<div class="card border-0 shadow-lg rounded-4"><div class="card-body p-4">
<h4 class="fw-bold text-center">Set New Password</h4>
<form method="post">{% csrf_token %}
{% for field in form %}<div class="mb-3"><label class="form-label small">{{ field.label }}</label>{{ field }}{% if field.errors %}<div class="text-danger small">{{ field.errors.0 }}</div>{% endif %}</div>{% endfor %}
<button type="submit" class="btn btn-primary w-100 rounded-pill py-2">Reset Password</button>
</form></div></div></div></div></div></div>
{% endblock %}
